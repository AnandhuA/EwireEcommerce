name: ewire_ecommerce
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.12.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  cached_network_image: ^3.4.1
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  flutter_spinkit: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_1024.png"

flutter:

  uses-material-design: true

  assets:
    - assets/banners/
    - assets/icon/

